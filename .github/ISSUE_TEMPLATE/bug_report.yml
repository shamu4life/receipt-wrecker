name: Bug report
description: Something is broken or behaving incorrectly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app is affected?
      options:
        - Big Text mode
        - Image mode
        - Tier selection (Blocks / CJK / Braille / Big text)
        - Census (Print test strip)
        - Cheer-ready output (Cheer100 + nonce)
        - Output / copy button / character budget
        - Web UI / layout
        - Other / not sure
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: "e.g. Chrome 124, Safari 17.4, Firefox 125"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS & version
      placeholder: "e.g. iOS 17.4, Android 15, macOS 14.4, Windows 11"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Console errors, the exact text/image that misformatted, the options you used (tier, columns, quantize mode), a photo of the actual receipt print if relevant, screenshots or screen recordings — anything that helps.
    validations:
      required: false
