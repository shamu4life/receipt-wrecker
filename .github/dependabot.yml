# Dependabot configuration — automated dependency-update PRs.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# This project has zero runtime dependencies; the only npm thing to keep current
# is the Wrangler devDependency. Dependabot also watches the actions used in CI
# (github-actions).
version: 2
updates:
  # Wrangler (the sole devDependency) — package.json / package-lock.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"

  # GitHub Actions pinned in .github/workflows/ci.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
