name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege GITHUB_TOKEN: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  ci:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Unit tests
        run: npm test

      - name: Validate Worker & config (dry-run deploy)
        run: npx wrangler deploy --dry-run
